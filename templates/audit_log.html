{% extends "base.html" %}
{% block title %}Audit Log — OakFiles{% endblock %}

{% block content %}
<div class="admin-page">
  <h1>Audit Log</h1>

  <form class="audit-filters" id="audit-filter-form" onsubmit="return false;">
    <label class="field field--inline">
      <span class="field__label">From</span>
      <input id="filter-from" class="field__input field__input--sm" type="date">
    </label>
    <label class="field field--inline">
      <span class="field__label">To</span>
      <input id="filter-to" class="field__input field__input--sm" type="date">
    </label>
    <label class="field field--inline">
      <span class="field__label">Event</span>
      <input id="filter-event" class="field__input field__input--sm" type="text" placeholder="e.g. login_success">
    </label>
    <label class="field field--inline">
      <span class="field__label">User</span>
      <input id="filter-user" class="field__input field__input--sm" type="text">
    </label>
    <button class="btn btn--primary btn--sm" onclick="loadAudit(0)">Filter</button>
    <button class="btn btn--ghost btn--sm" onclick="clearFilters()">Clear</button>
  </form>

  <div id="audit-container"><p class="hint">Loading…</p></div>
  <div id="audit-pagination" class="pagination"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const CSRF = document.querySelector('meta[name="csrf-token"]')?.content || '';
let _currentOffset = 0;
const PAGE = 100;

function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function clearFilters() {
  ['filter-from','filter-to','filter-event','filter-user'].forEach(id => document.getElementById(id).value = '');
  loadAudit(0);
}

async function loadAudit(offset=0) {
  _currentOffset = offset;
  const params = new URLSearchParams();
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  const event = document.getElementById('filter-event').value.trim();
  const user = document.getElementById('filter-user').value.trim();
  if (from) params.set('from', from + 'T00:00:00Z');
  if (to) params.set('to', to + 'T23:59:59Z');
  if (event) params.set('event', event);
  if (user) params.set('username', user);
  params.set('limit', PAGE);
  params.set('offset', offset);

  const res = await fetch('/api/audit?' + params, {headers: {'X-CSRF-Token': CSRF}});
  const data = await res.json();
  const c = document.getElementById('audit-container');

  if (!data.entries.length) {
    c.innerHTML = '<p class="hint hint--center">No entries found.</p>';
    document.getElementById('audit-pagination').innerHTML = '';
    return;
  }

  c.innerHTML = `
    <table class="file-table audit-table">
      <thead><tr>
        <th>Time (UTC)</th><th>User</th><th>Event</th><th>IP</th><th class="hide-mobile">Detail</th>
      </tr></thead>
      <tbody>${data.entries.map(e => `
        <tr>
          <td class="mono">${escHtml(e.ts.replace('T',' ').replace('Z',''))}</td>
          <td>${escHtml(e.username)}</td>
          <td><code class="event-tag">${escHtml(e.event)}</code></td>
          <td class="mono">${escHtml(e.ip_address || '')}</td>
          <td class="hide-mobile muted">${e.detail ? escHtml(JSON.stringify(e.detail)) : ''}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

  const pg = document.getElementById('audit-pagination');
  const totalPages = Math.ceil(data.total / PAGE);
  const curPage = Math.floor(offset / PAGE);
  pg.innerHTML = `
    <span class="pagination__info">Showing ${offset+1}–${Math.min(offset+PAGE, data.total)} of ${data.total}</span>
    ${curPage > 0 ? `<button class="btn btn--ghost btn--sm" onclick="loadAudit(${(curPage-1)*PAGE})">← Prev</button>` : ''}
    ${curPage < totalPages-1 ? `<button class="btn btn--ghost btn--sm" onclick="loadAudit(${(curPage+1)*PAGE})">Next →</button>` : ''}`;
}

loadAudit(0);
</script>
{% endblock %}
