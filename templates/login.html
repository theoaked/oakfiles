<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — OakFiles</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h1 class="login-card__title">OakFiles</h1>

    {% if error %}
      <p class="alert alert--error">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <label class="field">
        <span class="field__label">Username</span>
        <input class="field__input" type="text" name="username" autocomplete="username"
               autofocus required>
      </label>
      <label class="field">
        <span class="field__label">Password</span>
        <input class="field__input" type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn btn--primary btn--full">Sign in</button>
    </form>
  </div>
</body>
</html>
